          link: "https://cassiandloganaregettingmarried.com"

  # Contact
  contact:
    enable: true
    content: "My inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!"
    btnName: Email me
    btnLink: mailto:logan@mohseni.io

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/mohsenil85
      # linkedin: https://linkedin.com/in/loganmohseni

  listPages:
    disableFeaturedImage: true

  singlePages:
    socialShare: false
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: false
    tags:
      openInNewTab: true

  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"
