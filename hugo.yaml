baseURL: "https://mohseni.io"
languageCode: "en-us"
title: "Logan Mohseni"

module:
  imports:
    - path: github.com/gurusabarish/hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 10

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: blog
      name: Blog
      title: Blog
      url: /blogs
      weight: 1
    - identifier: resume
      name: Resume
      title: Resume
      url: /resume
      weight: 2

params:
  title: "Logan Mohseni"
  description: "Senior full-stack engineer. Portfolio and blog."
  favicon: "/fav.png"
  useBootstrapCDN: false
  mathjax: false
  animate: false
  customCSS: true

  theme:
    defaultTheme: "light"
    disableThemeToggle: true

  color:
    textColor: "#1f1d1a"
    secondaryTextColor: "#5f5a52"
    textLinkColor: "#2f5f8f"
    backgroundColor: "#f7f4ed"
    secondaryBackgroundColor: "#f1ece2"
    primaryColor: "#2f5f8f"
    secondaryColor: "#fffdf8"

  font:
    fontSize: 1.06rem
    fontWeight: 400
    lineHeight: 1.7
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Logan Mohseni"
    showBrandLogo: false
    disableSearch: true
    stickyNavBar:
      enable: false
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Senior full-stack engineer"
    title: "Logan Mohseni"
    subtitle: "I build things for the web"
    content: "Senior full-stack engineer with 12+ years shipping production systems. Currently delivering serverless applications on AWS for nuclear and gas utility operations at Xcel Energy."
    # image: /images/hero.png
    bottomImage:
      enable: false
    button:
      enable: true
      name: "Resume"
      url: "/files/resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/mohsenil85
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/loganmohseni

  # About
  about:
    enable: true
    title: "About Me"
    # image: "/images/me.png"
    content: |-
      I'm a senior full-stack engineer with 12+ years of professional experience building and shipping production systems.
      Currently delivering serverless applications on AWS for nuclear and gas utility operations at [Xcel Energy](https://www.xcelenergy.com/).
      My background spans infrastructure, backend architecture, and frontend development.

      Before Xcel, I spent 9 years at SingleMind Consulting growing from Jr. Sysadmin to Sr. Developer, shipping features for a top-5 textbook publisher's platform (millions of users), managing 30+ Linux/FreeBSD hosts, and becoming the team's go-to for git, CI/CD, and AWS.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "TypeScript"
        - "React"
        - "Node.js"
        - "Python"
        - "AWS (Lambda, DynamoDB, API Gateway)"
        - "Terraform"
        - "Docker"
        - "Java / Spring Boot"

  # Experience
  experience:
    enable: true
    items:
      - company: "Xcel Energy"
        companyUrl: "https://www.xcelenergy.com/"
        jobs:
          - name: "Software Engineer"
            date: "2022 - Present"
            content: |
              Building serverless applications on AWS for nuclear and gas utility operations.

              - Built a full-stack nuclear outage scheduling platform (React, Node.js, Lambda, DynamoDB)
              - Drove platform-wide SSO migration, eliminating 13,000 lines of legacy auth code
              - Led DDD refactor of API layer into domain aggregates and bounded contexts
              - Integrated OpenSearch Serverless for materials search, reducing code complexity 30%
              - Led greenfield app foundation: monorepo structure, build tooling, TypeScript, CI/CD
              - Designed SAP integration service, unblocking batch processing across incompatible systems
              - Maintained Terraform IaC across 3+ apps (DynamoDB, Lambda, API Gateway, IAM)
              - Shipped shared TypeScript DTO packages with automated CI/CD for API contract consistency

      - company: "SingleMind Consulting"
        companyUrl: "https://www.singlemindconsulting.com/"
        jobs:
          - name: "Sr. Software Developer / Systems Administrator"
            date: "2013 - 2022"
            content: |
              Grew from Jr. Sysadmin to Sr. Developer over 9 years. Shipped features for a top-5 textbook publisher's platform (millions of users), managed 30+ Linux/FreeBSD hosts, and became the team's go-to for git, CI/CD, and AWS.

  # Education
  education:
    enable: true
    index: false
    items:
      - title: "B.S. Linguistics (Anthropology)"
        school:
          name: "University of Montana, Missoula"
          # url: "https://www.umt.edu"
        date: "May 2011"

  # Projects (placeholder -- fill in your own)
  projects:
    enable: true
    items:
      - title: "MCP Servers"
        content: "Model Context Protocol servers for integrating AI assistants with external tools — Soulseek, git-bug, restic backups, job search workflows, and more."
        badges:
          - "MCP"
          - "Python"
          - "TypeScript"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/slskd-mcp"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/git-bug-mcp"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/claude-output-cache"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/restic-mcp"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/jobkit-mcp"
      - title: "Claude Code Tools"
        content: "Tools and extensions for Claude Code — task dispatch, reusable skills, and procedurally-generated sound effects."
        badges:
          - "Claude Code"
          - "CLI"
          - "TypeScript"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/claude-dispatch"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/claude-skills"
          - icon: "fab fa-github"
            url: "https://github.com/mohsenil85/claude-sound-actions"
      - title: "Mountain Dreamer Counseling"
        content: "Website for a private counseling practice based in Colorado."
        badges:
          - "Hugo"
          - "GitHub Pages"
        featured:
          name: "Visit"
          link: "https://mountaindreamercounseling.com"
      - title: "Imbolc Studio"
        content: "A command-line digital audio workstation."
        badges:
          - "CLI"
          - "Audio"
        featured:
          name: "Visit"
